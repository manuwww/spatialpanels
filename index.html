<!doctype html>
<html lang="en">
  <head>
    <title>XR WebComics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      // Daten für unsere Comic-Bibliothek mit 9 Webtoons inkl. Cover-URLs und echten Bild-URLs
      const LIBRARY_DATA = [
        {
          id: 'comic1', coverTitle: "Die Entdeckung", theme: "Fantasy", coverColor: "#ff6b6b",
          coverUrl: "https://manuwww.github.io/spatialpanels/Hueterin/Hueterin_Cover.png",
          pages: [
            // HIER FÜGST DU DIE URLs ZU DEINEN EIGENEN BILDERN EIN (PNG für Transparenz!)
            // Beispiel: { imageUrl: "https://deinewebsite.de/bilder/seite1.png" } 
            { imageUrl: "https://manuwww.github.io/spatialpanels/Hueterin/Hueterin_panel0.png" },
            { imageUrl: "https://manuwww.github.io/spatialpanels/Hueterin/Hueterin_panel1.png" },
            { imageUrl: "https://manuwww.github.io/spatialpanels/Hueterin/Hueterin_panel2.png" }
            { imageUrl: "https://manuwww.github.io/spatialpanels/Hueterin/Hueterin_panel3.png" }
            { imageUrl: "https://manuwww.github.io/spatialpanels/Hueterin/Hueterin_panel4.pngg" }
            { imageUrl: "https://manuwww.github.io/spatialpanels/Hueterin/Hueterin_panel5.png" }
            { imageUrl: "https://manuwww.github.io/spatialpanels/Hueterin/Hueterin_panel6.png" }
          ]
        },
        {
          id: 'comic2', coverTitle: "Magische Reise", theme: "Fantasy", coverColor: "#9b59b6",
          coverUrl: "https://placehold.co/300x400/9b59b6/FFFFFF.png?text=Magische+Reise",
          pages: [
            { imageUrl: "https://placehold.co/1024x1024/9b59b6/FFFFFF.png?text=Seite+1" },
            { imageUrl: "https://placehold.co/1024x1024/e67e22/FFFFFF.png?text=Seite+2" }
          ]
        },
        {
          id: 'comic3', coverTitle: "Alltag", theme: "Slice of Life", coverColor: "#f1c40f",
          coverUrl: "https://placehold.co/300x400/f1c40f/FFFFFF.png?text=Alltag",
          pages: [
            { imageUrl: "https://placehold.co/1024x1024/f1c40f/FFFFFF.png?text=Seite+1" },
            { imageUrl: "https://placehold.co/1024x1024/e74c3c/FFFFFF.png?text=Seite+2" }
          ]
        },
        {
          id: 'comic4', coverTitle: "Tierfreunde", theme: "Comedy", coverColor: "#2ecc71",
          coverUrl: "https://placehold.co/300x400/2ecc71/FFFFFF.png?text=Tierfreunde",
          pages: [
            { imageUrl: "https://placehold.co/1024x1024/2ecc71/FFFFFF.png?text=Seite+1" },
            { imageUrl: "https://placehold.co/1024x1024/27ae60/FFFFFF.png?text=Seite+2" }
          ]
        },
        {
          id: 'comic5', coverTitle: "Das Geheimnis", theme: "Mystery", coverColor: "#34495e",
          coverUrl: "https://placehold.co/300x400/34495e/FFFFFF.png?text=Das+Geheimnis",
          pages: [
            { imageUrl: "https://placehold.co/1024x1024/34495e/FFFFFF.png?text=Seite+1" },
            { imageUrl: "https://placehold.co/1024x1024/2c3e50/FFFFFF.png?text=Seite+2" }
          ]
        },
        {
          id: 'comic6', coverTitle: "Sporthelden", theme: "Sports", coverColor: "#e67e22",
          coverUrl: "https://placehold.co/300x400/e67e22/FFFFFF.png?text=Sporthelden",
          pages: [
            { imageUrl: "https://placehold.co/1024x1024/e67e22/FFFFFF.png?text=Seite+1" },
            { imageUrl: "https://placehold.co/1024x1024/d35400/FFFFFF.png?text=Seite+2" }
          ]
        },
        {
          id: 'comic7', coverTitle: "Sternenreise", theme: "Sci-Fi", coverColor: "#1abc9c",
          coverUrl: "https://placehold.co/300x400/1abc9c/FFFFFF.png?text=Sternenreise",
          pages: [
            { imageUrl: "https://placehold.co/1024x1024/1abc9c/FFFFFF.png?text=Seite+1" },
            { imageUrl: "https://placehold.co/1024x1024/16a085/FFFFFF.png?text=Seite+2" }
          ]
        },
        {
          id: 'comic8', coverTitle: "Zauberschule", theme: "Fantasy", coverColor: "#e74c3c",
          coverUrl: "https://placehold.co/300x400/e74c3c/FFFFFF.png?text=Zauberschule",
          pages: [
            { imageUrl: "https://placehold.co/1024x1024/e74c3c/FFFFFF.png?text=Seite+1" },
            { imageUrl: "https://placehold.co/1024x1024/c0392b/FFFFFF.png?text=Seite+2" }
          ]
        },
        {
          id: 'comic9', coverTitle: "Piratenschatz", theme: "Abenteuer", coverColor: "#3498db",
          coverUrl: "https://placehold.co/300x400/3498db/FFFFFF.png?text=Piratenschatz",
          pages: [
            { imageUrl: "https://placehold.co/1024x1024/3498db/FFFFFF.png?text=Seite+1" },
            { imageUrl: "https://placehold.co/1024x1024/2980b9/FFFFFF.png?text=Seite+2" }
          ]
        }
      ];

      /**
       * Main application logic for the WebXR Comic Viewer.
       */
      class WebComic extends xb.Script {
        constructor() {
          super();
          this.currentComic = LIBRARY_DATA[0];
          this.currentIndex = 0;
          this.textures = [];
          this.animPhase = 1.0;
          
          this.isShelfOpen = false;
          
          // Startposition des gesamten Konstrukts
          this.initialPos = new THREE.Vector3(0, xb.user.height + 0.3, -xb.user.objectDistance - 0.5);

          // Swipe Erkennung
          this.lastHandPositions = [null, null];
          this.swipeCooldown = 0;
        }

        init() {
          // 1. Beleuchtung
          this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 2.5));
          const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
          dirLight.position.set(1, 2, 1);
          this.add(dirLight);

          // 2. Ein einziges Haupt-Panel (Root), komplett transparent
          this.mainPanel = new xb.SpatialPanel({
            backgroundColor: '#00000000', // Transparent
            showEdge: false,
            width: 1.8,
            height: 2.2 // Höhe leicht vergrößert für mehr Abstand
          });
          this.mainPanel.isRoot = true; // Komplettes Fenster ist greifbar
          this.mainPanel.position.copy(this.initialPos);
          this.add(this.mainPanel);

          const mainGrid = this.mainPanel.addGrid();

          // --- BEREICH 1: Der Comic (Oben zentriert) ---
          const comicRow = mainGrid.addRow({ weight: 0.65 });
          
          this.comicGroup = new THREE.Group();
          const geometry = new THREE.PlaneGeometry(1.2, 1.2); // Leicht verkleinert, um Überlappung zu verhindern
          const material = new THREE.MeshBasicMaterial({ transparent: true, opacity: 1.0, side: THREE.DoubleSide });
          this.comicMesh = new THREE.Mesh(geometry, material);
          this.comicGroup.add(this.comicMesh);
          
          comicRow.addCol({ weight: 1.0 }).add(this.comicGroup);

          // Kleiner Abstandhalter, damit nichts überlappt
          mainGrid.addRow({ weight: 0.05 });

          // --- BEREICH 2: Navigationsleiste (Unter dem Comic) ---
          const navContainer = mainGrid.addRow({ weight: 0.12 }).addCol({ weight: 1.0 });
          const navPanel = navContainer.addPanel({
            backgroundColor: '#1a1c20ee', // Dunkler, sichtbarer Hintergrund für die Leiste
            margin: 0.01,
            cornerRadius: 0.05
          });
          
          const navRow = navPanel.addGrid().addRow({ weight: 1.0 });

          // Unsichtbarer Platzhalter links, damit die Pfeile wirklich zentriert sind
          navRow.addCol({ weight: 0.15 });

          // Zurück-Pfeil
          this.prevBtn = navRow.addCol({ weight: 0.2 }).addIconButton({ 
            text: 'skip_previous', fontSize: 0.15 
          });
          this.prevBtn.onTriggered = () => this.prevPanel();

          // Seitenzahl (Zentriert im Panel)
          this.pageText = navRow.addCol({ weight: 0.3 }).addText({ 
            text: '1 / X', fontSize: 0.08, fontColor: '#ffffff' 
          });

          // Vorwärts-Pfeil
          this.nextBtn = navRow.addCol({ weight: 0.2 }).addIconButton({ 
            text: 'skip_next', fontSize: 0.15 
          });
          this.nextBtn.onTriggered = () => this.nextPanel();

          // Bibliotheks-Button (Buch-Icon) ganz rechts außen
          this.toggleShelfBtn = navRow.addCol({ weight: 0.15 }).addIconButton({ 
            text: 'menu_book', fontSize: 0.15 
          });
          this.toggleShelfBtn.onTriggered = () => this.toggleShelf();

          // --- BEREICH 3: Reset-Button (Wie vorher, aber nah an der Navigation) ---
          const resetRow = mainGrid.addRow({ weight: 0.12 });
          
          resetRow.addCol({ weight: 0.25 }); // Platzhalter links zum Zentrieren

          this.resetBtn = resetRow.addCol({ weight: 0.5 }).addTextButton({
            text: '🎯 Alles Zentrieren', 
            fontSize: 0.06, 
            backgroundColor: '#8e44ad', 
            fontColor: '#ffffff',
            margin: 0.02
          });
          this.resetBtn.onTriggered = () => this.resetPositions();

          resetRow.addCol({ weight: 0.25 }); // Platzhalter rechts zum Zentrieren

          // Unsichtbarer Platzhalter unten, damit das Layout nicht gestreckt wird
          mainGrid.addRow({ weight: 0.08 });

          // --- BEREICH 4: Das Webtoon Regal (Wird als "Kind" angehängt!) ---
          this.shelfPanel = new xb.SpatialPanel({
            backgroundColor: '#1a1c20ee',
            width: 1.8,
            height: 1.9,
            cornerRadius: 0.05
          });
          // Positioniert das Regal exakt unter das leicht höhere mainPanel (-2.0 statt -1.85)
          this.shelfPanel.position.set(0, -2.0, 0.05); 
          this.shelfPanel.visible = this.isShelfOpen; // Startet geschlossen
          this.mainPanel.add(this.shelfPanel);

          const shelfGrid = this.shelfPanel.addGrid();
          
          // --- HEADER: Titel und Schließen-Button ---
          const headerRow = shelfGrid.addRow({weight: 0.15});
          headerRow.addCol({weight: 0.8}).addText({
              text: "📚 Bibliothek", 
              fontSize: 0.08, 
              fontColor: "#61dafb"
          });
          const closeShelfBtn = headerRow.addCol({weight: 0.2}).addIconButton({
              text: 'close',
              fontSize: 0.15,
              backgroundColor: '#e74c3c',
              fontColor: '#ffffff'
          });
          closeShelfBtn.onTriggered = () => this.toggleShelf();
          
          // 3x3 Grid für die Comics
          const r1 = shelfGrid.addRow({weight: 0.28});
          const r2 = shelfGrid.addRow({weight: 0.28});
          const r3 = shelfGrid.addRow({weight: 0.28});
          const rows = [r1, r2, r3];
          
          LIBRARY_DATA.forEach((comic, idx) => {
              const rowIndex = Math.floor(idx / 3);
              
              // Einzelner Regal-Slot mit Rahmenfarbe des Comics
              const cell = rows[rowIndex].addCol({weight: 1/3}).addPanel({
                  backgroundColor: comic.coverColor, margin: 0.015
              });
              
              // Nur das Coverbild im Grid (kein Text)
              const img = cell.addGrid().addRow().addImage({ 
                  src: comic.coverUrl, paddingX: 0.02, paddingY: 0.02 
              });
              
              // Mache Zelle & Bild klickbar
              const clickHandler = () => { this.loadComic(comic); };
              img.onTriggered = clickHandler;
              cell.onTriggered = clickHandler; 
          });

          // Orbiter hinzufügen, damit das Regal in der Größe anpassbar ist
          shelfGrid.addOrbiter();

          // Lade den anfänglichen Comic
          this.loadComic(this.currentComic);
        }

        /**
         * Setzt das App-Fenster auf seine Startposition zurück.
         */
        resetPositions() {
          this.mainPanel.position.copy(this.initialPos);
          this.mainPanel.quaternion.identity();
          
          // Kurzes visuelles Feedback
          this.resetBtn.backgroundColor = '#2ecc71';
          setTimeout(() => { this.resetBtn.backgroundColor = '#8e44ad'; }, 300);
        }

        /**
         * Klappt das 3x3 Regal auf und zu
         */
        toggleShelf() {
          this.isShelfOpen = !this.isShelfOpen;
          this.shelfPanel.visible = this.isShelfOpen;

          // Elegantes Feedback: Das Icon ändert sich zu einem Kreuz, wenn das Regal offen ist
          if (this.isShelfOpen) {
            this.toggleShelfBtn.text = 'close';
          } else {
            this.toggleShelfBtn.text = 'menu_book';
          }
        }

        /**
         * Lädt einen neuen Comic, wenn man im Regal auf ein Cover klickt.
         */
        loadComic(comicData) {
          this.currentComic = comicData;
          this.currentIndex = 0;
          
          // Alte Texturen sicher aus dem Grafikspeicher entfernen
          this.textures.forEach(t => t && t.dispose());
          this.textures = new Array(this.currentComic.pages.length).fill(null);

          const loader = new THREE.TextureLoader();

          // Lade alle Seiten als Texturen asynchron über die URLs
          this.currentComic.pages.forEach((page, idx) => {
            loader.load(page.imageUrl, (texture) => {
              // Wichtig für eine schöne Farbdarstellung
              texture.colorSpace = THREE.SRGBColorSpace;
              this.textures[idx] = texture;
              
              // Falls dies die erste Seite ist, die geladen wurde, zeige sie sofort an
              if (idx === 0) {
                this.updateUI();
                this.triggerPop();
              }
            });
          });
        }

        nextPanel() {
          if (this.currentIndex < this.textures.length - 1) {
            this.currentIndex++;
            this.updateUI();
            this.triggerPop();
          }
        }

        prevPanel() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
            this.updateUI();
            this.triggerPop();
          }
        }

        triggerPop() {
          const texture = this.textures[this.currentIndex];
          if (texture) {
            // Textur setzen, wenn sie schon geladen ist
            this.comicMesh.material.map = texture;
            this.comicMesh.material.needsUpdate = true;
          }
          // Animation neu starten
          this.animPhase = 0.0;
        }

        updateUI() {
          this.pageText.setText(`${this.currentIndex + 1} / ${this.textures.length}`);
        }

        update() {
          const dt = xb.getDeltaTime();

          // --- Pop-Up Animation ---
          if (this.animPhase < 1.0) {
            this.animPhase += dt * 3.5;
            if (this.animPhase > 1.0) this.animPhase = 1.0;

            const p = this.animPhase;
            const baseScale = 1.0 - Math.pow(1.0 - p, 3);
            const overshoot = Math.sin(p * Math.PI) * 0.15;
            this.comicGroup.scale.setScalar(baseScale + overshoot);

            this.comicMesh.material.opacity = Math.min(1.0, p * 2.0);
          }

          // --- Hand Gesten Erkennung (Wischen) ---
          if (this.swipeCooldown > 0) {
            this.swipeCooldown -= dt;
          } else {
            const handsData = xb.user.hands;
            if (handsData && handsData.hands && handsData.hands.length > 0) {
              for (let i = 0; i < handsData.hands.length; i++) {
                const hand = handsData.hands[i];
                if (hand && hand.joints && hand.joints['wrist']) {
                  const wristPosition = hand.joints['wrist'].position;
                  
                  if (this.lastHandPositions[i]) {
                    const deltaX = wristPosition.x - this.lastHandPositions[i].x;
                    const velocityX = deltaX / dt;

                    // Wischen nach rechts -> Vorheriges Panel
                    if (velocityX > 1.2) {
                      this.prevPanel();
                      this.swipeCooldown = 0.6;
                    }
                    // Wischen nach links -> Nächstes Panel
                    else if (velocityX < -1.2) {
                      this.nextPanel();
                      this.swipeCooldown = 0.6;
                    }
                  }
                  
                  this.lastHandPositions[i] = wristPosition.clone();
                }
              }
            } else {
              this.lastHandPositions = [null, null];
            }
          }
        }
      }

      // Start App
      document.addEventListener('DOMContentLoaded', () => {
        const options = new xb.Options();
        options.enableUI();
        options.enableHands();
        
        options.hands.enabled = true;
        options.hands.visualization = true;
        options.hands.visualizeMeshes = true;
        
        options.setAppTitle('XR WebComic');
        xb.add(new WebComic());
        xb.init(options);
      });
    </script>
  </body>
</html>
